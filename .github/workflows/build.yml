name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  XRAY_VERSION: v1.8.10

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Download Xray native binary + geo data
        run: |
          set -e
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/assets
          cd /tmp
          wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-android-arm64-v8a.zip" -O xray.zip
          unzip -q xray.zip
          # Android فقط lib*.so رو توی nativeLibraryDir می‌ذاره
          cp xray "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libxray.so"
          chmod +x "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libxray.so"
          # geo data برای routing
          cp geoip.dat geosite.dat "$GITHUB_WORKSPACE/app/src/main/assets/"
          ls -lh "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/"
          ls -lh "$GITHUB_WORKSPACE/app/src/main/assets/"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log | tail -80

      - name: Show compile errors if failed
        if: failure()
        run: |
          echo "==== last 100 lines of build log ===="
          tail -100 /tmp/build.log || true
          echo "==== kotlin errors ===="
          grep -E "^e:|error:|FAILED|What went wrong" /tmp/build.log || true

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ofa-vpn-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build status
        if: always()
        run: |
          if ls app/build/outputs/apk/debug/*.apk 1>/dev/null 2>&1; then
            echo "BUILD SUCCESSFUL"
            ls -lh app/build/outputs/apk/debug/*.apk
          else
            echo "BUILD FAILED - no APK"
            exit 1
          fi
