name: Build OFA VPN

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download Xray Binary
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          wget -q https://github.com/XTLS/Xray-core/releases/download/v1.8.10/Xray-android-arm64-v8a.zip -O xray.zip
          unzip xray.zip -d xray_dir
          find xray_dir -type f -name "xray" -exec mv {} app/src/main/jniLibs/arm64-v8a/libxray.so \;
          chmod +x app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (Signed)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ofa-vpn-signed-apk
          path: app/build/outputs/apk/debug/app-debug.apk
