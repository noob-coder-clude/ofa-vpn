name: Build OFA VPN APK
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "ndk;r25c" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a app/src/main/assets
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip -O /tmp/xray.zip || true
          if [ -f /tmp/xray.zip ]; then
            unzip -q /tmp/xray.zip -d /tmp/xray-pkg || true
            [ -f /tmp/xray-pkg/libxray.so ] && cp /tmp/xray-pkg/libxray.so app/src/main/jniLibs/arm64-v8a/
            [ -f /tmp/xray-pkg/xray ] && cp /tmp/xray-pkg/xray app/src/main/jniLibs/arm64-v8a/libxray.so
          fi
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -O app/src/main/assets/geoip.dat || true
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat -O app/src/main/assets/geosite.dat || true
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: ofa-vpn-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
