name: Build APK with Native Binaries

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  XRAY_VERSION: v1.8.10
  TUN2SOCKS_VERSION: latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: 34
          sdk-build-tools: 34.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Download Xray native binary
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cd app/src/main/jniLibs/arm64-v8a
          wget -q https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-android-arm64-v8a.zip
          unzip -q Xray-android-arm64-v8a.zip
          mv libxray.so .
          rm -f ../Xray-android-arm64-v8a.zip
          cd ../../..

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ofa-vpn-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30