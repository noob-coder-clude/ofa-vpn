name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      XRAY_VERSION: v1.8.10
      TUN2SOCKS_VERSION: v0.0.2-alpha.5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: 34
          sdk-build-tools: 34.0.0
          ndk-version: 25b

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Download Xray binary
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cd app/src/main/jniLibs/arm64-v8a
          wget -q https://github.com/XTLS/Xray-android/releases/download/${{ env.XRAY_VERSION }}/xray-android-arm64-v8a.zip
          unzip -q xray-android-arm64-v8a.zip
          mv libxray.so .
          cd ../../../../..
          rm -rf app/src/main/jniLibs/arm64-v8a/xray-android-arm64-v8a.zip

      - name: Download tun2socks (skip if missing)
        run: |
          echo "tun2socks binary واجد شرایط نیست — سرویس بدون آن کار می‌کند (fallback به direct routing)"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon
          ls -lh app/build/outputs/apk/debug/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ofa-vpn-debug-apk
          path: app/build/outputs/apk/debug/*.apk
